---
name: Release

'on':
  push:
    branches:
      - master

permissions:
  contents: write
  pull-requests: read

concurrency:
  group: release-master
  cancel-in-progress: false

jobs:
  release:
    name: release
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve PR labels and compute next version
        id: version
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const sha = context.sha;

            const baseBranch = context.ref.replace("refs/heads/", "");
            let pr = null;

            const associated = await github.rest.repos
              .listPullRequestsAssociatedWithCommit({
                owner,
                repo,
                commit_sha: sha,
              });
            if (associated.data.length) {
              const merged = associated.data.find((item) => item.merged_at);
              pr = merged || associated.data[0];
            }

            if (!pr) {
              const closedPrs = await github.paginate(
                github.rest.pulls.list,
                {
                  owner,
                  repo,
                  state: "closed",
                  base: baseBranch,
                  sort: "updated",
                  direction: "desc",
                  per_page: 100,
                }
              );
              const bySha = closedPrs.find(
                (item) => item.merged_at && item.merge_commit_sha === sha
              );
              if (bySha) {
                pr = bySha;
              }
            }

            if (!pr) {
              const headMessage = context.payload.head_commit?.message || "";
              const prNumberMatch = headMessage.match(/#(\d+)/);
              if (prNumberMatch) {
                const prNumber = Number(prNumberMatch[1]);
                const fetched = await github.rest.pulls.get({
                  owner,
                  repo,
                  pull_number: prNumber,
                });
                if (fetched.data.merged_at) {
                  pr = fetched.data;
                }
              }
            }

            if (!pr) {
              core.setFailed(
                `Unable to resolve merged PR for commit ${sha}. ` +
                "Release requires PR-based merges with version:* labels."
              );
              return;
            }

            const labels = pr.labels.map((label) => label.name);

            const impactLabels = [
              "version:major",
              "version:minor",
              "version:patch",
            ];
            const preLabels = [
              "version:alpha",
              "version:beta",
              "version:rc",
            ];

            const impact = impactLabels.filter(
              (label) => labels.includes(label)
            );
            const prerelease = preLabels.filter(
              (label) => labels.includes(label)
            );

            if (impact.length !== 1) {
              core.setFailed(
                "Expected exactly one impact label: " +
                impactLabels.join(", ")
              );
              return;
            }

            if (prerelease.length > 1) {
              core.setFailed(
                "Expected at most one prerelease label: " +
                preLabels.join(", ")
              );
              return;
            }

            const tagResp = await github.rest.repos.listTags({
              owner,
              repo,
              per_page: 100,
            });

            const semverTag = /^v(\d+)\.(\d+)\.(\d+)$/;
            const stableTags = tagResp.data
              .map((tag) => tag.name)
              .filter((name) => semverTag.test(name));

            const previousTag = stableTags[0] || "v0.0.0";
            const previousTagExists = stableTags.length > 0;

            const match = previousTag.match(semverTag);
            if (!match) {
              core.setFailed(`Unable to parse previous tag ${previousTag}.`);
              return;
            }

            let major = Number(match[1]);
            let minor = Number(match[2]);
            let patch = Number(match[3]);

            if (impact[0] === "version:major") {
              major += 1;
              minor = 0;
              patch = 0;
            } else if (impact[0] === "version:minor") {
              minor += 1;
              patch = 0;
            } else {
              patch += 1;
            }

            let nextVersion = `${major}.${minor}.${patch}`;
            if (prerelease.length === 1) {
              const stage = prerelease[0].split(":")[1];
              nextVersion = `${nextVersion}-${stage}.1`;
            }

            const nextTag = `v${nextVersion}`;

            core.info(`PR #${pr.number} labels: ${labels.join(", ")}`);
            core.info(`Previous stable tag: ${previousTag}`);
            core.info(`Next tag: ${nextTag}`);

            core.setOutput("pr_number", String(pr.number));
            core.setOutput("pr_title", pr.title);
            core.setOutput("previous_tag", previousTag);
            core.setOutput("previous_tag_exists", String(previousTagExists));
            core.setOutput("next_version", nextVersion);
            core.setOutput("next_tag", nextTag);
            core.setOutput("prerelease", String(prerelease.length === 1));

      - name: Generate release changelog
        id: changelog
        uses: actions/github-script@v7
        env:
          PREVIOUS_TAG: ${{ steps.version.outputs.previous_tag }}
          PREVIOUS_TAG_EXISTS: ${{ steps.version.outputs.previous_tag_exists }}
          PR_NUMBER: ${{ steps.version.outputs.pr_number }}
          PR_TITLE: ${{ steps.version.outputs.pr_title }}
          NEXT_TAG: ${{ steps.version.outputs.next_tag }}
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const sha = context.sha;
            const previousTag = process.env.PREVIOUS_TAG;
            const previousTagExists = (
              process.env.PREVIOUS_TAG_EXISTS === "true"
            );
            const prNumber = process.env.PR_NUMBER;
            const nextTag = process.env.NEXT_TAG;

            let commits = [];

            if (previousTagExists) {
              try {
                const compare = await github.rest.repos.compareCommits({
                  owner,
                  repo,
                  basehead: `${previousTag}...${sha}`,
                });
                commits = compare.data.commits || [];
              } catch (error) {
                core.warning(
                  `Compare by tag failed (${previousTag}...${sha}): ` +
                  `${error.message}`
                );
                try {
                  const tagCommit = await github.rest.repos.getCommit({
                    owner,
                    repo,
                    ref: previousTag,
                  });
                  const baseSha = tagCommit.data.sha;
                  const compareBySha = await github.rest.repos.compareCommits({
                    owner,
                    repo,
                    basehead: `${baseSha}...${sha}`,
                  });
                  commits = compareBySha.data.commits || [];
                } catch (fallbackError) {
                  core.warning(
                    "Falling back to listCommits because compare failed: " +
                    `${fallbackError.message}`
                  );
                  const commitList = await github.rest.repos.listCommits({
                    owner,
                    repo,
                    sha,
                    per_page: 50,
                  });
                  commits = commitList.data || [];
                }
              }
            } else {
              const commitList = await github.rest.repos.listCommits({
                owner,
                repo,
                sha,
                per_page: 20,
              });
              commits = commitList.data || [];
            }

            const prNumbers = new Set();
            prNumbers.add(Number(prNumber));

            for (const commit of commits) {
              const firstLine = commit.commit.message.split("\n")[0];
              const mergeMatch = firstLine.match(/^Merge pull request #(\d+)/);
              if (mergeMatch) {
                prNumbers.add(Number(mergeMatch[1]));
              }
              const squashMatch = firstLine.match(/\(#(\d+)\)$/);
              if (squashMatch) {
                prNumbers.add(Number(squashMatch[1]));
              }

              const commitPrs = await github.rest.repos
                .listPullRequestsAssociatedWithCommit({
                  owner,
                  repo,
                  commit_sha: commit.sha,
                });
              for (const item of commitPrs.data) {
                if (item.merged_at) {
                  prNumbers.add(item.number);
                }
              }
            }

            const mergedPrs = [];
            const sortedPrNumbers = Array.from(prNumbers).sort(
              (a, b) => a - b
            );
            for (const number of sortedPrNumbers) {
              const prResp = await github.rest.pulls.get({
                owner,
                repo,
                pull_number: number,
              });
              if (prResp.data.merged_at) {
                mergedPrs.push(prResp.data);
              }
            }

            const nonMergeCommits = commits.filter((commit) => {
              const firstLine = commit.commit.message.split("\n")[0];
              return !firstLine.startsWith("Merge pull request #");
            });

            const lines = [];
            lines.push(`# ${nextTag}`);
            lines.push("");
            if (previousTagExists) {
              lines.push(`Changes since ${previousTag}.`);
            } else {
              lines.push("Initial release window.");
            }
            lines.push("");
            lines.push("## Merged Pull Requests");

            if (mergedPrs.length) {
              for (const pr of mergedPrs) {
                lines.push(`- #${pr.number} ${pr.title}`);
              }
            } else {
              lines.push("- No merged pull requests resolved for this window.");
            }

            if (nonMergeCommits.length) {
              lines.push("");
              lines.push("## Direct Commits");
              for (const commit of nonMergeCommits.slice(-20)) {
                const shaShort = commit.sha.substring(0, 7);
                const firstLine = commit.commit.message.split("\n")[0];
                lines.push(`- ${shaShort} ${firstLine}`);
              }
            }

            core.setOutput("body", lines.join("\n"));

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.next_tag }}
          name: ${{ steps.version.outputs.next_tag }}
          body: ${{ steps.changelog.outputs.body }}
          target_commitish: ${{ github.sha }}
          prerelease: ${{ steps.version.outputs.prerelease }}
